<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>猎人名鉴详情</title>
  <link rel="stylesheet" href="./styles.css?v=20260327-1642" />
</head>
<body class="hunter-theme" data-page="hunter">
  <div class="grid-bg"></div><div class="halo halo-b"></div><div class="grain-overlay"></div>
  <main class="dashboard usage-ready-dashboard detail-page-shell">
    <header class="panel glass detail-hero armor-shell">
      <a class="ghost-btn" href="./overview.html">返回总览</a>
      <div class="chip chip-live" id="detail-chip">猎人名鉴</div>
      <h1 id="detail-title">猎人详情</h1>
      <p class="muted" id="detail-subtitle"></p>
      <p class="focus-summary" id="detail-summary"></p>
    </header>
    <section class="detail-grid">
      <section class="panel glass armor-shell">
        <div class="panel-head"><h3>猎人档案</h3><span class="panel-tag">DOSSIER</span></div>
        <div class="summary-strip" id="detail-stats"></div>
      </section>
      <aside class="task-side-stack">
        <section class="panel glass parchment-panel armor-shell">
          <div class="panel-head"><h3>专长标签</h3><span class="panel-tag">SPECIALTY</span></div>
          <div class="summary-strip detail-side-strip" id="detail-side"></div>
        </section>
        <section class="panel glass armor-shell">
          <div class="panel-head"><h3>编辑猎人</h3><span class="panel-tag">EDIT</span></div>
          <form id="hunter-update-form" class="console-form">
            <label>
              <span>当前状态</span>
              <select id="hunter-status-input" name="status">
                <option value="观察中">观察中</option>
                <option value="可调度">可调度</option>
                <option value="重点跟进">重点跟进</option>
                <option value="暂缓使用">暂缓使用</option>
                <option value="已归档">已归档</option>
              </select>
            </label>
            <label>
              <span>来源</span>
              <select id="hunter-source-input" name="source">
                <option value="手动创建">手动创建</option>
                <option value="任务发现">任务发现</option>
                <option value="外部导入">外部导入</option>
                <option value="内部转化">内部转化</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <label><span>一句备注</span><textarea id="hunter-note-input" name="note" rows="3" maxlength="100" placeholder="补一句当前最关键的背景信息"></textarea></label>
            <label>
              <span>初始标签</span>
              <select id="hunter-tags-input" name="tags" multiple size="6">
                <option value="待验证">待验证</option>
                <option value="高优先">高优先</option>
                <option value="特殊来源">特殊来源</option>
                <option value="观察样本">观察样本</option>
                <option value="重点跟进">重点跟进</option>
                <option value="暂缓使用">暂缓使用</option>
              </select>
            </label>
            <p class="muted">承载、成功率、平均消耗、画像定位等动态信息由后台根据任务记录自动生成，这里不再手动填写。</p>
            <button class="primary-btn" type="submit">保存猎人资料</button>
            <div class="muted" id="hunter-update-status"></div>
          </form>
        </section>
      </aside>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-browser.js?v=auth-2"></script>
  <script src="./auth.js?v=auth-2"></script>
  <script src="./details.js?v=auth-3"></script>
</body>
</html>
>
