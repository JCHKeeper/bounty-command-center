<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>添加猎人</title>
  <link rel="stylesheet" href="./styles-1720.css?v=forms-1" />
</head>
<body class="hunter-theme">
  <main class="dashboard usage-ready-dashboard detail-page-shell simple-task-page">
    <header class="panel glass detail-hero armor-shell">
      <a class="ghost-btn" href="./overview.html">返回总览</a>
      <div class="chip chip-live">HUNTER CREATE</div>
      <h1>添加猎人</h1>
      <p class="muted">录入新的猎人档案，提交后会直接写入指挥中心数据库。</p>
    </header>
    <section class="panel glass armor-shell">
      <form id="hunter-form" class="action-stack" style="display:grid;gap:12px;">
        <input name="name" placeholder="猎人名称" required />
        <input name="role" placeholder="职责 / 定位" required />
        <input name="title" placeholder="称号" />
        <input name="status" placeholder="当前状态" required />
        <input name="model" placeholder="使用模型" />
        <input name="load" placeholder="当前承载，例如 1 / 3" />
        <input name="success_rate" placeholder="成功率，例如 92" type="number" min="0" max="100" />
        <input name="avg_tokens" placeholder="平均消耗，例如 24000" type="number" min="0" />
        <input name="tags" placeholder="专长标签，逗号分隔" />
        <button class="primary-btn" type="submit">保存猎人</button>
        <div id="hunter-form-status" class="muted"></div>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-browser.js?v=1"></script>
  <script src="./new-hunter.js?v=1"></script>
</body>
</html>
