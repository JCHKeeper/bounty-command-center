<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>指挥中心总览界面</title>
  <link rel="stylesheet" href="./styles.css?v=20260319-1102" />
</head>
<body class="hunter-theme">
  <div class="grid-bg"></div>
  <div class="halo halo-a"></div>
  <div class="halo halo-b"></div>
  <div class="grain-overlay"></div>

  <header class="topbar compact-topbar minimal-topbar guild-header-shell embedded-header">
    <div class="guild-embed-trace" aria-hidden="true"></div>
    <div class="guild-brand">
      <div class="guild-logo-shell">
        <img class="guild-logo" src="./assets/jieyu-guild-logo-placeholder.svg" alt="界域公会Logo" />
      </div>
      <div class="guild-brand-copy">
        <div class="guild-name">界域</div>
        <h1>指挥大厅</h1>
      </div>
    </div>
  </header>

  <main class="dashboard simplified-dashboard hunter-dashboard mech-dashboard usage-ready-dashboard">
    <section class="hero glass panel simplified-hero bounty-hero mech-hero armor-shell">
      <div class="hero-frame hero-frame-left"></div>
      <div class="hero-frame hero-frame-right"></div>
      <div class="hero-copy mech-hero-copy hero-copy-minimal">
        <div class="chip chip-live reactor-chip" id="hero-eyebrow">界域-核心</div>
      </div>
      <div class="kpi-row mech-kpis" id="kpi-row"></div>
    </section>

    <section class="focus-grid hunter-focus-grid">
      <section class="panel glass primary-focus bounty-board">
        <div class="panel-head">
          <h3>头号悬赏令</h3>
          <span class="panel-tag">TOP BOUNTY</span>
        </div>

        <article class="focus-card pulse-border bounty-card">
          <div class="bounty-ribbon" id="bounty-ribbon"></div>

          <div class="wanted-header">
            <div class="wanted-seal" id="wanted-seal"></div>
            <div class="wanted-id" id="wanted-id"></div>
            <div class="wanted-publisher" id="wanted-publisher"></div>
          </div>

          <div class="focus-head">
            <div>
              <div class="task-title big" id="bounty-title"></div>
              <div class="task-meta" id="bounty-meta"></div>
            </div>
            <span class="badge danger" id="bounty-priority"></span>
          </div>

          <p class="focus-summary" id="bounty-summary"></p>
          <div class="focus-meta-grid" id="bounty-facts"></div>
          <div class="bounty-reward-strip" id="bounty-rewards"></div>
          <div class="focus-actions" id="bounty-actions"></div>
        </article>
      </section>

      <section class="side-rail">
        <section class="panel glass subpanel alerts-panel parchment-panel armor-shell armor-shell-warn">
          <div class="panel-head">
            <h3>催命榜 / 待拍板</h3>
            <span class="panel-tag">HOT CONTRACTS</span>
          </div>
          <div class="alert-list" id="alerts-list"></div>
        </section>

        <section class="panel glass subpanel action-panel parchment-panel armor-shell armor-shell-side">
          <div class="panel-head">
            <h3>猎人动作 / 调度日志</h3>
            <span class="panel-tag">HUNTER ACTIONS</span>
          </div>
          <div class="timeline-list" id="timeline-list"></div>
        </section>
      </section>
    </section>

    <section class="panel glass task-bounty-panel armor-shell armor-shell-wide offset-shell">
      <div class="panel-head list-head-with-tabs task-board-head">
        <div>
          <h3>任务悬赏榜</h3>
          <p class="muted board-desc">全任务主榜。先在这里筛选、排序、挑重点，再点进各自详细页处理。</p>
        </div>
        <div class="filter-tabs" id="task-tabs"></div>
      </div>
      <div class="summary-strip" id="task-summary"></div>
      <div class="board-toolbar">
        <label class="search-shell">
          <span>任务检索</span>
          <input id="task-search" type="search" placeholder="搜索任务名、负责人、任务类型…" />
        </label>
        <div class="view-note" id="task-view-note"></div>
      </div>
      <div class="bounty-list" id="task-board"></div>
    </section>

    <section class="panel glass dossier-panel armor-shell armor-shell-wide">
      <div class="panel-head">
        <div>
          <h3>猎人名鉴</h3>
          <p class="muted board-desc">所有 Agents 的档案面板。看专长、状态、承载量和性价比，用来决定派谁出手。</p>
        </div>
        <span class="panel-tag">HUNTER DOSSIERS</span>
      </div>
      <div class="summary-strip" id="hunter-summary"></div>
      <div class="roster-grid dossier-grid" id="roster-grid"></div>
    </section>

    <section class="panel glass resource-panel parchment-panel armor-shell armor-shell-wide">
      <div class="panel-head">
        <div>
          <h3>资源消耗</h3>
          <p class="muted board-desc">先看今日消耗，再按任务 / 猎人 / 模型追责。不是只看烧了多少，而是看值不值。</p>
        </div>
        <span class="panel-tag">TOKEN / COST</span>
      </div>
      <div class="resource-kpis" id="resource-kpis"></div>
      <div class="resource-grid">
        <section class="resource-block">
          <div class="resource-block-head">
            <h4>模型消耗排行</h4>
            <span>按今日 Token</span>
          </div>
          <div class="model-bars" id="model-bars"></div>
        </section>
        <section class="resource-block">
          <div class="resource-block-head">
            <h4>异常消耗提醒</h4>
            <span>优先处理浪费点</span>
          </div>
          <div class="spend-alerts" id="spend-alerts"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="./app.js?v=20260319-1102"></script>
</body>
</html>
