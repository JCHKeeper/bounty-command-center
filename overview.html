<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>指挥中心总览界面</title>
  <link rel="stylesheet" href="./styles.css?v=2" />
</head>
<body class="hunter-theme">
  <div class="grid-bg"></div>
  <div class="halo halo-a"></div>
  <div class="halo halo-b"></div>
  <div class="grain-overlay"></div>

  <header class="topbar compact-topbar minimal-topbar guild-header-shell embedded-header">
    <div class="guild-embed-trace" aria-hidden="true"></div>
    <div class="guild-brand">
      <div class="guild-logo-shell">
        <img class="guild-logo" src="./assets/jieyu-guild-logo-placeholder.svg" alt="界域公会Logo" />
      </div>
      <div class="guild-brand-copy">
        <div class="guild-name">界域</div>
        <h1>指挥大厅</h1>
      </div>
    </div>
  </header>

  <main class="dashboard simplified-dashboard hunter-dashboard mech-dashboard">
    <section class="hero glass panel simplified-hero bounty-hero mech-hero armor-shell">
      <div class="hero-frame hero-frame-left"></div>
      <div class="hero-frame hero-frame-right"></div>
      <div class="hero-copy mech-hero-copy">
        <div class="chip chip-live reactor-chip" id="hero-eyebrow"></div>
        <h2 id="hero-title"></h2>
        <p class="muted" id="hero-description"></p>
      </div>
      <div class="reactor-core-wrap">
        <div class="reactor-side-tag reactor-side-tag-top">灵核稳态</div>
        <div class="reactor-side-tag reactor-side-tag-bottom">甲片共鸣</div>
        <div class="reactor-core" aria-hidden="true">
          <div class="reactor-ring reactor-ring-outer"></div>
          <div class="reactor-ring reactor-ring-mid"></div>
          <div class="reactor-ring reactor-ring-inner"></div>
          <div class="reactor-center"></div>
        </div>
      </div>
      <div class="kpi-row mech-kpis" id="kpi-row"></div>
    </section>

    <section class="focus-grid hunter-focus-grid">
      <section class="panel glass primary-focus bounty-board">
        <div class="panel-head">
          <h3>当前首要悬赏</h3>
          <span class="panel-tag">PRIME BOUNTY</span>
        </div>

        <article class="focus-card pulse-border bounty-card">
          <div class="bounty-ribbon" id="bounty-ribbon"></div>

          <div class="wanted-header">
            <div class="wanted-seal" id="wanted-seal"></div>
            <div class="wanted-id" id="wanted-id"></div>
            <div class="wanted-publisher" id="wanted-publisher"></div>
          </div>

          <div class="focus-head">
            <div>
              <div class="task-title big" id="bounty-title"></div>
              <div class="task-meta" id="bounty-meta"></div>
            </div>
            <span class="badge danger" id="bounty-priority"></span>
          </div>

          <p class="focus-summary" id="bounty-summary"></p>
          <div class="focus-meta-grid" id="bounty-facts"></div>
          <div class="bounty-reward-strip" id="bounty-rewards"></div>
          <div class="focus-actions" id="bounty-actions"></div>
        </article>
      </section>

      <section class="side-rail">
        <section class="panel glass subpanel alerts-panel parchment-panel armor-shell armor-shell-warn">
          <div class="panel-head">
            <h3>异常 / 待决策</h3>
            <span class="panel-tag">FIELD ALERTS</span>
          </div>
          <div class="alert-list" id="alerts-list"></div>
        </section>

        <section class="panel glass subpanel action-panel parchment-panel armor-shell armor-shell-side">
          <div class="panel-head">
            <h3>快速入口</h3>
            <span class="panel-tag">GUILD ACTIONS</span>
          </div>
          <div class="action-stack" id="quick-actions"></div>
        </section>
      </section>
    </section>

    <section class="panel glass medal-roster-panel armor-shell armor-shell-wide">
      <div class="panel-head">
        <h3>队员勋章榜</h3>
        <span class="panel-tag">HUNTER MEDALS</span>
      </div>
      <p class="muted medal-rule" id="medal-rule"></p>
      <div class="medal-summary-strip" id="medal-summary"></div>
      <div class="roster-grid" id="roster-grid"></div>
    </section>

    <section class="panel glass compact-list-panel parchment-panel armor-shell armor-shell-wide offset-shell">
      <div class="panel-head list-head-with-tabs">
        <h3>悬赏任务列表</h3>
        <div class="filter-tabs">
          <button class="tab active">全部</button>
          <button class="tab">进行中</button>
          <button class="tab">阻塞</button>
          <button class="tab">已完成</button>
        </div>
      </div>
      <div class="compact-task-list" id="task-list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
