<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>任务详情</title>
  <link rel="stylesheet" href="./styles.css?v=20260319-1138" />
</head>
<body class="hunter-theme" data-page="task">
  <div class="grid-bg"></div><div class="halo halo-a"></div><div class="grain-overlay"></div>
  <main class="dashboard usage-ready-dashboard detail-page-shell simple-task-page">
    <header class="panel glass detail-hero armor-shell">
      <a class="ghost-btn" href="./overview.html">返回总览</a>
      <div class="chip chip-live" id="detail-chip">任务详情</div>
      <h1 id="detail-title">任务详情</h1>
      <p class="muted" id="detail-subtitle"></p>
    </header>

    <section class="panel glass armor-shell">
      <div class="panel-head"><h3>头部总览</h3><span class="panel-tag">MISSION SNAPSHOT</span></div>
      <div class="summary-strip" id="detail-stats"></div>
    </section>

    <section class="detail-grid simple-task-grid">
      <section class="task-main-stack">
        <section class="panel glass armor-shell">
          <div class="panel-head"><h3>任务说明</h3><span class="panel-tag">BRIEF</span></div>
          <p class="focus-summary detail-copy" id="detail-summary"></p>
        </section>

        <section class="panel glass armor-shell">
          <div class="panel-head"><h3>当前进展</h3><span class="panel-tag">CURRENT STATUS</span></div>
          <div class="summary-strip detail-side-strip" id="detail-progress"></div>
        </section>

        <section class="panel glass parchment-panel armor-shell">
          <div class="panel-head"><h3>动作记录</h3><span class="panel-tag">ACTION LOG</span></div>
          <div class="timeline-list" id="detail-log"></div>
        </section>
      </section>

      <aside class="task-side-stack">
        <section class="panel glass parchment-panel armor-shell">
          <div class="panel-head"><h3>操作区</h3><span class="panel-tag">CONTROL</span></div>
          <div class="action-stack" id="detail-actions"></div>
        </section>
        <section class="panel glass armor-shell">
          <div class="panel-head"><h3>快速更新</h3><span class="panel-tag">UPDATE</span></div>
          <form id="task-update-form" class="console-form">
            <label><span>任务状态</span><input id="task-status-input" name="status" placeholder="例如：执行中 / 待审批" /></label>
            <label><span>当前猎人</span><input id="task-hunter-input" name="hunter_label" placeholder="例如：Northwind / Vanta" /></label>
            <label><span>任务进度（0-100）</span><input id="task-progress-input" name="progress" type="number" min="0" max="100" /></label>
            <label><span>最新进展</span><textarea id="task-latest-progress-input" name="latest_progress" rows="4" placeholder="填写最新进展"></textarea></label>
            <button class="primary-btn" type="submit">保存更新</button>
            <div class="muted" id="task-update-status"></div>
          </form>
        </section>
        <section class="panel glass armor-shell">
          <div class="panel-head"><h3>追加日志</h3><span class="panel-tag">LOG</span></div>
          <form id="task-log-form" class="console-form">
            <label><span>日志标题</span><input name="title" placeholder="例如：已转入重装突入" /></label>
            <label><span>日志内容</span><textarea name="text" rows="4" placeholder="记录发生了什么"></textarea></label>
            <label><span>级别</span><input name="level" placeholder="info / warn / success / critical" /></label>
            <button class="ghost-btn" type="submit">写入日志</button>
            <div class="muted" id="task-log-status"></div>
          </form>
        </section>
      </aside>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-browser.js?v=2"></script>
  <script src="./details.js?v=formal-2"></script>
</body>
</html>
>
